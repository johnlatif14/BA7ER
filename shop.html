<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الملابس</title>
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
  <header>
    <div class="header-right">متجر الأناقة</div>
    <nav>
      <ul>
        <li><a href="index.html">الرئيسية</a></li>
        <li><a href="shop.html">الملابس</a></li>
        <li><a href="contact.html">الاستفسار</a></li>
        <li><a href="suggestions.html">الاقتراحات</a></li>
      </ul>
    </nav>
    <button id="toggle-mode">🌙</button>
  </header>

  <main>
    <h1>المنتجات المتاحة</h1>
    <div id="products"></div>
  </main>

  <script src="scripts/app.js"></script>
  <script>
    // منتجات وهمية (يمكن استبدالها بقاعدة بيانات لاحقاً)
    const products = [
      {
        name: "تيشيرت أبيض",
        sizes: ["S", "M", "L", "XL", "OS"],
        price: "150 جنيه"
      },
      {
        name: "بنطلون جينز",
        sizes: ["S", "M", "L", "XL"],
        price: "220 جنيه"
      }
    ];

    const container = document.getElementById("products");
    products.forEach(p => {
      container.innerHTML += `
        <div class="product-card">
          <h3>${p.name}</h3>
          <p>المقاسات: ${p.sizes.join(", ")}</p>
          <p>السعر: ${p.price}</p>
          <label>اختر العدد:
            <input type="number" min="1" max="10" value="1" />
          </label>
          <br>
          <label>طريقة الدفع:</label>
          <select onchange="handlePayment(this)">
            <option value="cod">الدفع عند الاستلام</option>
            <option value="vodafone">فودافون كاش</option>
          </select>
          <div class="vodafone-details" style="display:none;">
            <p>رقم التحويل: 01000000000</p>
            <label>اسم المحول:</label><input type="text"><br>
            <label>رقم المرسل:</label><input type="text"><br>
            <label>صورة التحويل:</label><input type="file"><br>
          </div>
          <label>البريد الإلكتروني:</label><input type="email"><br>
          <label>رقم الهاتف:</label><input type="tel"><br>
          <button>أضف للسلة</button>
          <hr>
        </div>
      `;
    });

    function handlePayment(selectElement) {
      const detailsDiv = selectElement.parentElement.querySelector(".vodafone-details");
      if (selectElement.value === "vodafone") {
        detailsDiv.style.display = "block";
      } else {
        detailsDiv.style.display = "none";
      }
    }
  </script>
</body>
</html>
