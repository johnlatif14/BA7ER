<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
 <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        input {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .error {
            color: red;
            text-align: center;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2 style="text-align: center;">تسجيل الدخول</h2>
        <form id="loginForm">
            <input type="hidden" name="_csrf" id="csrfToken">
            <input type="text" name="username" placeholder="اسم المستخدم" required>
            <input type="password" name="password" placeholder="كلمة المرور" required>
            <button type="submit">دخول</button>
        </form>
        <div id="errorMessage" style="color: red; margin-top: 1rem; text-align: center;"></div>
    </div>

    <script>
        // جلب CSRF token عند تحميل الصفحة
        fetch('/api/csrf-token')
            .then(res => res.json())
            .then(data => {
                document.getElementById('csrfToken').value = data.csrfToken;
            });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const errorElement = document.getElementById('errorMessage');
            errorElement.textContent = '';
            
            const formData = new FormData(e.target);
            const data = {
                username: formData.get('username'),
                password: formData.get('password'),
                _csrf: formData.get('_csrf')
            };

            fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    window.location.href = result.redirect;
                } else {
                    errorElement.textContent = result.error || 'فشل تسجيل الدخول';
                }
            })
            .catch(error => {
                errorElement.textContent = 'فشل الاتصال بالسيرفر';
            });
        });
    </script>
</body>
</html>
