<!DOCTYPE html><html lang="ar" dir="rtl"><head>
<meta charset="utf-8"><title>دخول الأدمن</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.4.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
</head><body>
<main class="d-flex align-items-center justify-content-center vh-100">
  <div class="card p-4 shadow" style="width:320px">
    <h4 class="card-title text-center">تسجيل دخول الأدمن</h4>
    <form id="loginForm" action="/login" method="POST">
      <input type="hidden" name="_csrf" id="csrf">
      <div class="mb-3"><input name="username" class="form-control" placeholder="اسم المستخدم" required></div>
      <div class="mb-3"><input type="password" name="password" class="form-control" placeholder="كلمة المرور" required></div>
      <button class="btn btn-primary w-100">دخول</button>
    </form>
  </div>
</main>
<script>
fetch('/api/csrf-token')
  .then(res=>res.json())
  .then(data=>{ document.getElementById('csrf').value = data.csrfToken; });
</script>
</body></html>
