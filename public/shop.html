<!DOCTYPE html><html lang="ar" dir="rtl"><head>
<meta charset="utf-8"><title>الملابس</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.4.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
</head><body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <a class="navbar-brand" href="/">متجر بحر</a>
</nav>
<main class="container mt-4">
  <h3>منتجاتنا</h3>
  <div class="row" id="products"></div>
</main>
<script>
const socket = io();
socket.on('new-product',()=>location.reload());
fetch('/api/products')
.then(res=>res.json())
.then(data=>{
  const row=document.getElementById('products');
  data.forEach(p=>{
    const col=document.createElement('div');
    col.className="col-md-4";
    col.innerHTML=`
      <div class="card mb-4 shadow-sm">
        <img src="/uploads/${p.image}" class="card-img-top">
        <div class="card-body text-center">
          <h5>${p.name}</h5>
          <p>${p.price} جنيه</p>
          <a href="/" class="btn btn-primary">اطلب دلوقتي</a>
        </div>
      </div>`;
    row.appendChild(col);
  });
});
</script>
</body></html>
