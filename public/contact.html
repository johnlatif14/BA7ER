<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اتصل بنا - متجر 𝐵𝒜𝟩𝐸𝑅</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="/">متجر 𝐵𝒜𝟩𝐸𝑅</a>
      <div class="navbar-nav">
        <a class="nav-link" href="/shop.html">المتجر</a>
        <a class="nav-link" href="/contact.html">اتصل بنا</a>
      </div>
    </div>
  </nav>
  
  <main class="container my-5">
    <h2 class="text-center mb-4">اتصل بنا</h2>
    <form id="contactForm" class="mx-auto" style="max-width: 600px;">
      <div class="mb-3">
        <input type="text" class="form-control" placeholder="الاسم" required>
      </div>
      <div class="mb-3">
        <input type="email" class="form-control" placeholder="البريد الإلكتروني" required>
      </div>
      <div class="mb-3">
        <textarea class="form-control" rows="5" placeholder="رسالتك" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary">إرسال</button>
    </form>
  </main>

  <script>
    document.getElementById('contactForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      // Handle form submission
      alert('تم استلام رسالتك، شكراً لتواصلك معنا!');
      e.target.reset();
    });
  </script>
</body>
</html>
