<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة التحكم</title>
  <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
  <main>
    <h1>لوحة تحكم الإدمن</h1>

    <section>
      <h2>رفع منتج جديد</h2>
      <form>
        <label>اسم المنتج:</label><br>
        <input type="text"><br>
        <label>السعر:</label><br>
        <input type="text"><br>
        <label>الصورة:</label><br>
        <input type="file"><br>
        <label>الكمية:</label><br>
        <input type="number" min="1"><br>
        <button>رفع</button>
      </form>
    </section>

    <section>
      <h2>إرسال رسالة للعميل (SMTP)</h2>
      <form>
        <label>البريد الإلكتروني:</label><br>
        <input type="email"><br>
        <label>الرسالة:</label><br>
        <textarea rows="4"></textarea><br>
        <button type="submit">إرسال</button>
      </form>
    </section>

    <section>
      <h2>تعديل الكمية في المخزون</h2>
      <form>
        <label>اسم المنتج:</label><br>
        <input type="text"><br>
        <label>الكمية الجديدة:</label><br>
        <input type="number" min="0"><br>
        <button>تحديث</button>
      </form>
    </section>
  </main>
</body>
</html>
